<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cologic — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0B1120;
            color: #F9FAFB;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: #1F2937;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
        }

        .brand img {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            object-fit: contain;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: #F9FAFB;
            letter-spacing: -0.3px;
        }

        .brand-sub {
            font-size: 13px;
            color: #6B7280;
            font-weight: 500;
            margin-top: -6px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            background: #111827;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #F9FAFB;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.15s;
            outline: none;
        }

        input:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        input::placeholder { color: #4B5563; }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #6366F1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s, transform 0.1s;
        }

        button[type="submit"]:hover { background: #818CF8; }
        button[type="submit"]:active { transform: scale(0.98); }
        button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            color: #F87171;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 14px;
            display: none;
        }

        .error-msg.visible { display: block; }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #374151;
            margin-top: 28px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <img src="https://i.ibb.co/q3NXdhnH/Cologic-LOGO-1.png" alt="Cologic">
            <div class="brand-name">Cologic</div>
            <div class="brand-sub">Shop Floor Tracker</div>
        </div>

        <form id="login-form" autocomplete="on">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button type="submit" id="login-btn">Sign In</button>
            <div class="error-msg" id="error-msg"></div>
        </form>

        <div class="footer-note">Cologic Shop Floor Tracker v2.0</div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const btn  = document.getElementById('login-btn');
        const err  = document.getElementById('error-msg');

        // If already logged in, go straight to dashboard
        fetch('/auth/me', { credentials: 'include' }).then(r => {
            if (r.ok) window.location.replace('/index.html');
        }).catch(() => {});

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            err.classList.remove('visible');
            btn.disabled = true;
            btn.textContent = 'Signing in…';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                });

                if (res.ok) {
                    window.location.replace('/index.html');
                } else {
                    const data = await res.json().catch(() => ({}));
                    err.textContent = data.detail || 'Invalid username or password';
                    err.classList.add('visible');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch {
                err.textContent = 'Cannot reach server. Is it running?';
                err.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
